services:
  rabbitmq:
    image: rabbitmq:4-alpine
    container_name: el-snow-hub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: elsnow
      RABBITMQ_DEFAULT_PASS: MqPass2024!@#
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - el-snow-hub
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: el-snow-hub-backend
    env_file:
      - ./backend/.env.prod
    depends_on:
      - rabbitmq
    networks:
      - el-snow-hub
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: el-snow-hub-nginx
    ports:
      - "5173:5173"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - el-snow-hub
    depends_on:
      - backend
    restart: unless-stopped

networks:
  el-snow-hub:
    external: true

volumes:
  rabbitmq_data:
