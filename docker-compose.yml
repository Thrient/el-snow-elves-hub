services:
  backend:
    build: ./backend
    container_name: el-snow-hub-backend
    env_file:
      - ./backend/.env.prod
    networks:
      - el-snow-hub
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: el-snow-hub-nginx
    ports:
      - "5173:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - el-snow-hub
    depends_on:
      - backend
    restart: unless-stopped

networks:
  el-snow-hub:
    external: true
