services:
  backend:
    build: ./backend
    container_name: el-snow-hub-backend
    env_file:
      - ./backend/.env.prod
    networks:
      - el-snow-hub
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: el-snow-hub-nginx
    ports:
      - "80:80"
      - "5173:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - certs:/etc/letsencrypt:ro
    networks:
      - el-snow-hub
    depends_on:
      - backend
    restart: unless-stopped

  certbot:
    build: ./certbot
    container_name: el-snow-hub-certbot
    volumes:
      - certs:/etc/letsencrypt
      - ./certbot/credentials.ini:/etc/letsencrypt/credentials.ini:ro
    entrypoint: ""
    command: sh -c "while :; do certbot renew --authenticator dns-aliyun --dns-aliyun-credentials /etc/letsencrypt/credentials.ini --quiet; sleep 43200; done"
    restart: unless-stopped

networks:
  el-snow-hub:
    external: true

volumes:
  certs:
    external: true
