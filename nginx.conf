events { worker_connections 1024; }

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200M;

    server {
        listen 5173;
        server_name *.elarion.cn;

        root /usr/share/nginx/html;
        index index.html;

        # 安全 headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; connect-src 'self' https:; font-src 'self'; media-src 'self'" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/v1/notifications/stream {
            proxy_pass http://backend:8000;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
        }

        location /api/v1/client/stream {
            proxy_pass http://backend:8000;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
        }

        location /api/v1/admin/stream {
            proxy_pass http://backend:8000;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
        }

        location /minio/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }
    }
}
