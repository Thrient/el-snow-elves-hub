events { worker_connections 1024; }

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 200M;

    # HTTP → HTTPS 重定向（Let's Encrypt 验证除外）
    server {
        listen 80;
        server_name elarion.cn *.elarion.cn;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name elarion.cn *.elarion.cn;

        ssl_certificate     /etc/letsencrypt/live/elarion.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/elarion.cn/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/v1/notifications/stream {
            proxy_pass http://backend:8000;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
        }

        location /api/v1/client/stream {
            proxy_pass http://backend:8000;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
        }

        location /api/v1/admin/stream {
            proxy_pass http://backend:8000;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
        }

        location /api/v1/files/ {
            proxy_pass http://backend:8000;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }
    }
}
